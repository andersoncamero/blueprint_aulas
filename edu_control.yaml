blueprint:
  name: Aula inteligente - Multi dispositivos
  description: "Plugin diseñado para la automatización integral de salones de clase. Soporta múltiples luces y termostatos."
  domain: automation
  input:
    motion_sensors:
      name: Sensores de Movimiento
      description: "Sensores de movimiento para detectar la presencia en el aula. Pueden ser binary_sensor o switch."
      selector:
        entity:
          domain:
            - binary_sensor
            - switch
          multiple: true

    opening_sensor:
      name: Sensor de puerta (Opcional)
      description: "Un sensor de puerta para detectar eventos de apertura/cierre."
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class: door

    modo_auto:
      name: Modo Automático
      description: "Helper input_boolean que controla si la automatización está activa. Si está ON, funciona automáticamente; si está OFF, modo manual."
      selector:
        entity:
          domain: input_boolean

    target_lights:
      name: Iluminación del Aula
      description: "Luz o grupo de luces que se controlarán automáticamente. Puedes seleccionar múltiples."
      selector:
        target:
          entity:
            domain:
              - light
              - switch

    target_climates:
      name: Termostatos
      description: "Termostatos del aula. Puedes seleccionar múltiples equipos de clima."
      default: {}
      selector:
        target:
          entity:
            domain: climate

    classroom_status:
      name: Estado del Aula (Helper)
      description: "Helper input_select que DEBE tener exactamente estas 4 opciones: LIBRE, OCUPADO, PUERTA_ABIERTA, SCAN."
      selector:
        entity:
          domain: input_select

    target_temperature:
      name: Temperatura Objetivo
      description: "Temperatura deseada cuando hay presencia en el aula."
      default: 22
      selector:
        number:
          min: 20
          max: 26
          unit_of_measurement: "°C"
          mode: slider

    off_delay:
      name: Tiempo de apagado
      description: "Tiempo de espera antes de considerar el aula libre tras no detectar presencia."
      default: 300
      selector:
        number:
          min: 60
          max: 1800
          unit_of_measurement: seconds
          mode: slider
          step: 30

    delay_between_checks:
      name: Intervalo fijo entre comprobaciones
      description: "Temporizador fijo entre comprobaciones (segundos). No configurable desde la interfaz."
      default: 10

    countdown_indicator:
      name: Indicador de Cuenta Regresiva (Opcional)
      description: "Helper input_number que mostrará el tiempo restante durante los delays. Déjalo vacío si no quieres indicador visual."
      default: ""
      selector:
        entity:
          domain: input_number

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input motion_sensors
    to:
      - "on"
      - "detected"
    id: "motion_detected"
  - platform: state
    entity_id: !input motion_sensors
    to:
      - "off"
      - "clear"
    id: "motion_cleared"
  - platform: state
    entity_id: !input opening_sensor
    from: "off"
    to: "on"
    id: "door_opened"
  - platform: state
    entity_id: !input opening_sensor
    from: "on"
    to: "off"
    id: "door_closed"
  - platform: state
    entity_id: !input classroom_status
    to: "LIBRE"
    id: "manual_libre_selected"

condition: []

action:
  - variables:
      motion_sensors_list: !input motion_sensors
      opening_sensor_entity: !input opening_sensor
      climate_list: !input target_climates
      lights_list: !input target_lights
      status_entity: !input classroom_status
      countdown_entity: !input countdown_indicator
      delay_between_checks: !input delay_between_checks
      scanning_time: !input off_delay
      is_blueprint_change: >-
        {{ trigger.id in ['door_opened', 'door_closed', 'motion_detected', 'motion_cleared'] }}

  - choose:
      # Condición para cuando se abre la puerta (cerrado → abierto)
      - conditions:
          - condition: trigger
            id: "door_opened"
          - condition: state
            entity_id: !input classroom_status
            state: "LIBRE"
          - condition: state
            entity_id: !input modo_auto
            state: "on"
        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "PUERTA_ABIERTA"

          - service: climate.set_temperature
            target: !input target_climates
            data:
              temperature: !input target_temperature
              hvac_mode: "cool"

          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_on
            target: !input target_lights

          - if:
              - condition: template
                value_template: "{{ countdown_entity != '' and countdown_entity is not none }}"
            then:
              - repeat:
                  count: "{{ (scanning_time / 10) | int }}"
                  sequence:
                    - service: input_number.set_value
                      target:
                        entity_id: "{{ countdown_entity }}"
                      data:
                        value: "{{ scanning_time - (repeat.index * 10) }}"
                    - delay:
                        seconds: 10
              - service: input_number.set_value
                target:
                  entity_id: "{{ countdown_entity }}"
                data:
                  value: 0
            else:
              - delay:
                  seconds: !input off_delay
              

          - service: climate.set_hvac_mode
            target: !input target_climates
            data:
              hvac_mode: "off"

          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_off
            target: !input target_lights

      # Condición para cuando se cierra la puerta (abierto → cerrado)
      - conditions:
          - condition: trigger
            id: "door_closed"
        sequence:

          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "SCAN"

          - service: climate.set_temperature
            target: !input target_climates
            data:
              temperature: !input target_temperature
              hvac_mode: "cool"
          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_on
            target: !input target_lights

          - if:
              - condition: template
                value_template: "{{ countdown_entity != '' and countdown_entity is not none }}"
            then:
              - repeat:
                  count: "{{ (scanning_time / 10) | int }}"
                  sequence:
                    - service: input_number.set_value
                      target:
                        entity_id: "{{ countdown_entity }}"
                      data:
                        value: "{{ scanning_time - (repeat.index * 10) }}"
                    - delay:
                        seconds: 10
              - service: input_number.set_value
                target:
                  entity_id: "{{ countdown_entity }}"
                data:
                  value: 0
            else:
              - delay:
                  seconds: !input off_delay

          - condition: template
            value_template: >-
              {%- set motion_entities = motion_sensors_list -%}
              {%- if motion_entities is string -%}
                {%- set motion_list = [motion_entities] -%}
              {%- else -%}
                {%- set motion_list = motion_entities -%}
              {%- endif -%}
              {%- set all_clear = namespace(value=true) -%}
              {%- for sensor in motion_list -%}
                {%- if states(sensor) not in ['off', 'clear', 'unavailable'] -%}
                  {%- set all_clear.value = false -%}
                {%- endif -%}
              {%- endfor -%}
              {{ all_clear.value }}

          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "LIBRE"

          - service: climate.set_hvac_mode
            target: !input target_climates
            data:
              hvac_mode: "off"

          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_off
            target: !input target_lights

      # Condición para cuando se detecta movimiento
      - conditions:
          - condition: trigger
            id: "motion_detected"
          - condition: state
            entity_id: !input modo_auto
            state: "on"

        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "OCUPADO"

          - service: climate.set_temperature
            target: !input target_climates
            data:
              temperature: !input target_temperature
              hvac_mode: "cool"

          # Cuenta regresiva visual para delay_between_checks

          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_on
            target: !input target_lights

      # Condición para cuando cesa el movimiento
      - conditions:
          - condition: trigger
            id: "motion_cleared"

        sequence:
          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "SCAN"
          - if:
              - condition: template
                value_template: "{{ countdown_entity != '' and countdown_entity is not none }}"
            then:
              - repeat:
                  count: "{{ (scanning_time / 10) | int }}"
                  sequence:
                    - service: input_number.set_value
                      target:
                        entity_id: "{{ countdown_entity }}"
                      data:
                        value: "{{ scanning_time - (repeat.index * 10) }}"
                    - delay:
                        seconds: 10
              - service: input_number.set_value
                target:
                  entity_id: "{{ countdown_entity }}"
                data:
                  value: 0
            else:
              - delay:
                  seconds: !input off_delay

          - condition: template
            value_template: >-
              {%- set motion_entities = motion_sensors_list -%}
              {%- if motion_entities is string -%}
                {%- set motion_list = [motion_entities] -%}
              {%- else -%}
                {%- set motion_list = motion_entities -%}
              {%- endif -%}
              {%- set all_clear = namespace(value=true) -%}
              {%- for sensor in motion_list -%}
                {%- if states(sensor) not in ['off', 'clear', 'unavailable'] -%}
                  {%- set all_clear.value = false -%}
                {%- endif -%}
              {%- endfor -%}
              {{ all_clear.value }}

          - service: input_select.select_option
            target:
              entity_id: !input classroom_status
            data:
              option: "LIBRE"

          - service: climate.set_hvac_mode
            target: !input target_climates
            data:
              hvac_mode: "off"

          - delay:
              seconds: !input delay_between_checks

          - service: homeassistant.turn_off
            target: !input target_lights
      
      # Condición para cuando se selecciona manualmente LIBRE
      - conditions:
          - condition: trigger
            id: "manual_libre_selected"
          - condition: template
            value_template: "{{ not is_blueprint_change }}"
        sequence:
          - service: climate.set_hvac_mode
            target: !input target_climates
            data:
              hvac_mode: "off"
          - service: homeassistant.turn_off
            target: !input target_lights          

